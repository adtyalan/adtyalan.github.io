name: Deploy Vite Site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch: # Memungkinkan kamu trigger manual dari tab Actions

permissions:
  contents: read
  pages: write
  id-token: write

# Mencegah tabrakan deployment jika kamu push berkali-kali dalam waktu singkat
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Sangat Penting: Vite secara default nge-build ke folder 'dist'
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
